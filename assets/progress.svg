<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">

  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#F6BCD4"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect
      x="10"
      y="10"
      width="680"
      height="280"
      rx="20"
      fill="#FFF8FC"
      stroke="#F8C4DA"
      stroke-width="3"
      filter="url(#shadow)"/>

  <text
      x="35"
      y="45"
      font-family="Verdana"
      font-size="24"
      font-weight="bold"
      fill="#D86C9A">
      📚 Learning Journey
  </text>

  <!-- Python -->
  <text x="35" y="90" font-family="Verdana" font-size="16" fill="#666">
    🐍 Python
  </text>

  <rect x="170" y="75" width="450" height="16" rx="8" fill="#FCE4EC"/>

  <rect x="170" y="75" width="420" height="16" rx="8" fill="url(#bar)">
    <animate attributeName="width"
      values="390;420;390"
      dur="2.5s"
      repeatCount="indefinite"/>
  </rect>

  <text x="635" y="89" font-size="14" fill="#D86C9A">95%</text>

  <!-- Data Science -->
  <text x="35" y="140" font-family="Verdana" font-size="16" fill="#666">
    📊 Data Science
  </text>

  <rect x="170" y="125" width="450" height="16" rx="8" fill="#FCE4EC"/>

  <rect x="170" y="125" width="375" height="16" rx="8" fill="url(#bar)">
    <animate attributeName="width"
      values="340;375;340"
      dur="2.8s"
      repeatCount="indefinite"/>
  </rect>

  <text x="635" y="139" font-size="14" fill="#D86C9A">85%</text>

  <!-- Fullstack -->
  <text x="35" y="190" font-family="Verdana" font-size="16" fill="#666">
    💻 Fullstack
  </text>

  <rect x="170" y="175" width="450" height="16" rx="8" fill="#FCE4EC"/>

  <rect x="170" y="175" width="350" height="16" rx="8" fill="url(#bar)">
    <animate attributeName="width"
      values="320;350;320"
      dur="3s"
      repeatCount="indefinite"/>
  </rect>

  <text x="635" y="189" font-size="14" fill="#D86C9A">80%</text>

  <!-- IoT -->
  <text x="35" y="240" font-family="Verdana" font-size="16" fill="#666">
    🤖 IoT
  </text>

  <rect x="170" y="225" width="450" height="16" rx="8" fill="#FCE4EC"/>

  <rect x="170" y="225" width="230" height="16" rx="8" fill="url(#bar)">
    <animate attributeName="width"
      values="190;230;190"
      dur="3.5s"
      repeatCount="indefinite"/>
  </rect>

  <text x="635" y="239" font-size="14" fill="#D86C9A">55%</text>

</svg>

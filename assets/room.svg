<svg xmlns="http://www.w3.org/2000/svg"
     width="900"
     height="450"
     viewBox="0 0 900 450">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8FC"/>
      <stop offset="100%" stop-color="#FFE8F4"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#DCA3C4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" rx="28" fill="url(#bg)"/>

  <!-- Floor -->
  <rect y="340" width="900" height="110" fill="#F8D7E6"/>

  <!-- Window -->
  <g transform="translate(340 45)">
    <rect width="220" height="120"
          rx="12"
          fill="#EAF8FF"
          stroke="#F6B8D3"
          stroke-width="6"/>

    <line x1="110" y1="0" x2="110" y2="120"
          stroke="#F6B8D3"
          stroke-width="5"/>

    <line x1="0" y1="60" x2="220" y2="60"
          stroke="#F6B8D3"
          stroke-width="5"/>

    <circle cx="60" cy="35" r="10" fill="#FFF"/>
    <circle cx="150" cy="45" r="12" fill="#FFF"/>
  </g>

  <!-- Bookshelf -->
  <g transform="translate(70 120)">
    <rect width="90" height="180"
          rx="8"
          fill="#DFA47F"/>

    <line x1="0" y1="60" x2="90" y2="60"
          stroke="#B7744D"
          stroke-width="4"/>

    <line x1="0" y1="120" x2="90" y2="120"
          stroke="#B7744D"
          stroke-width="4"/>

    <!-- Books -->
    <rect x="10" y="12" width="12" height="40" fill="#FF8FAB"/>
    <rect x="25" y="12" width="12" height="40" fill="#9AD0EC"/>
    <rect x="40" y="12" width="12" height="40" fill="#A8D5BA"/>
    <rect x="55" y="12" width="12" height="40" fill="#FFD166"/>

    <rect x="15" y="72" width="12" height="38" fill="#B8C0FF"/>
    <rect x="32" y="72" width="12" height="38" fill="#F7A6C3"/>
    <rect x="49" y="72" width="12" height="38" fill="#8BD3DD"/>
  </g>

  <!-- Desk -->
  <g transform="translate(250 260)">
    <rect width="420"
          height="20"
          rx="8"
          fill="#D7A07C"/>

    <rect x="18" y="20" width="12" height="70" fill="#C78963"/>
    <rect x="390" y="20" width="12" height="70" fill="#C78963"/>
  </g>

  <!-- Laptop -->
  <g transform="translate(380 185)">
    <rect width="120"
          height="70"
          rx="8"
          fill="#FFD9EC"
          stroke="#D86C9A"
          stroke-width="3"/>

    <rect x="10"
          y="10"
          width="100"
          height="45"
          fill="#2E3440"/>

    <text x="50"
          y="38"
          text-anchor="middle"
          font-family="monospace"
          font-size="11"
          fill="#8AFFC1">
      Python
    </text>

    <rect x="-10"
          y="70"
          width="140"
          height="10"
          rx="4"
          fill="#F4A6C4"/>
  </g>

  <!-- Coffee -->
  <g transform="translate(560 220)">
    <rect width="26"
          height="28"
          rx="4"
          fill="#FFF"/>

    <path d="M26 8
             Q36 8 36 18
             Q36 28 26 28"
          fill="none"
          stroke="#FFF"
          stroke-width="4"/>

    <path d="M10 -5
             C8 -15 15 -18 15 -26"
          stroke="#FFB7D5"
          stroke-width="2"
          fill="none">

      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;0 -4;0 0"
        dur="2s"
        repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Plant -->
  <g transform="translate(650 185)">
    <rect x="10"
          y="45"
          width="30"
          height="25"
          rx="4"
          fill="#C98F6F"/>

    <circle cx="25"
            cy="18"
            r="16"
            fill="#93D39C"/>

    <circle cx="12"
            cy="28"
            r="12"
            fill="#79C885"/>

    <circle cx="38"
            cy="30"
            r="12"
            fill="#79C885"/>
  </g>

  <!-- Mochi -->
  <g transform="translate(280 295)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="280 295;280 289;280 295"
      dur="2s"
      repeatCount="indefinite"/>

    <ellipse cx="0" cy="0" rx="30" ry="24"
             fill="#FFFDFE"/>

    <circle cx="0" cy="-28" r="24"
            fill="#FFFDFE"/>

    <polygon points="-15,-42 -7,-60 0,-40"
             fill="#FFFDFE"/>

    <polygon points="15,-42 7,-60 0,-40"
             fill="#FFFDFE"/>

    <ellipse cx="-8" cy="-30" rx="2.5" ry="4"
             fill="#444">
      <animate attributeName="ry"
               values="4;4;0.4;4"
               dur="4s"
               repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="8" cy="-30" rx="2.5" ry="4"
             fill="#444">
      <animate attributeName="ry"
               values="4;4;0.4;4"
               dur="4s"
               repeatCount="indefinite"/>
    </ellipse>

    <circle cx="0" cy="-20" r="2"
            fill="#F7A6C3"/>
  </g>

  <!-- Title -->
  <text x="450"
        y="420"
        text-anchor="middle"
        font-size="22"
        font-family="Verdana"
        fill="#C85C92"
        font-weight="bold">
        🌸 Evrill's Cozy Workspace 🌸
  </text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg"
     width="700"
     height="180"
     viewBox="0 0 700 180">

  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>

  <rect width="700" height="180" fill="transparent"/>

  <!-- Sakura 1 -->
  <text x="60" y="-10" font-size="22">🌸
    <animate attributeName="y"
             values="-10;170"
             dur="8s"
             repeatCount="indefinite"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 60 0;360 60 170"
      dur="8s"
      repeatCount="indefinite"/>
  </text>

  <!-- Sakura 2 -->
  <text x="150" y="-30" font-size="18">🌸
    <animate attributeName="y"
             values="-30;180"
             dur="10s"
             repeatCount="indefinite"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 150 0;-360 150 180"
      dur="10s"
      repeatCount="indefinite"/>
  </text>

  <!-- Sakura 3 -->
  <text x="280" y="-20" font-size="24">🌸
    <animate attributeName="y"
             values="-20;180"
             dur="7s"
             repeatCount="indefinite"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 280 0;360 280 180"
      dur="7s"
      repeatCount="indefinite"/>
  </text>

  <!-- Sakura 4 -->
  <text x="410" y="-15" font-size="20">🌸
    <animate attributeName="y"
             values="-15;180"
             dur="9s"
             repeatCount="indefinite"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 410 0;-360 410 180"
      dur="9s"
      repeatCount="indefinite"/>
  </text>

  <!-- Sakura 5 -->
  <text x="560" y="-25" font-size="22">🌸
    <animate attributeName="y"
             values="-25;180"
             dur="8.5s"
             repeatCount="indefinite"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 560 0;360 560 180"
      dur="8.5s"
      repeatCount="indefinite"/>
  </text>

  <!-- Sakura 6 -->
  <text x="650" y="-5" font-size="18">🌸
    <animate attributeName="y"
             values="-5;180"
             dur="11s"
             repeatCount="indefinite"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 650 0;-360 650 180"
      dur="11s"
      repeatCount="indefinite"/>
  </text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120">

<style>
    .box{
        fill:#FFF7FB;
        stroke:#F5A8C7;
        stroke-width:4;
    }

    .title{
        font-family:Verdana, sans-serif;
        font-size:22px;
        font-weight:bold;
        fill:#D86C9A;
    }

    .cursor{
        fill:#D86C9A;
    }
</style>

<!-- Dialog Box -->

<rect
x="10"
y="10"
rx="18"
ry="18"
width="680"
height="100"
class="box"/>

<!-- Pixel Hearts -->

<text x="30" y="36" font-size="18">🌸</text>
<text x="650" y="36" font-size="18">🌸</text>

<!-- Message -->

<text class="title" x="60" y="68">

<tspan opacity="1">
Hi, I'm Evrillia 💖
<animate
attributeName="opacity"
values="1;1;0;0;0"
dur="12s"
repeatCount="indefinite"/>
</tspan>

<tspan opacity="0">
Data Analyst 📊
<animate
attributeName="opacity"
values="0;0;1;1;0"
dur="12s"
repeatCount="indefinite"/>
</tspan>

<tspan opacity="0">
Data Scientist 🧠
<animate
attributeName="opacity"
values="0;0;0;1;1"
dur="12s"
repeatCount="indefinite"/>
</tspan>

</text>

<!-- Cursor -->

<rect
class="cursor"
x="320"
y="48"
width="5"
height="28">

<animate
attributeName="opacity"
values="1;0;1"
dur="0.8s"
repeatCount="indefinite"/>

</rect>

</svg>
